# 生产环境：通过 NPM 暴露，接入 web_network，数据在 /data
# 使用方式: docker compose -f docker-compose.prod.yml up -d
services:
  mysql:
    image: mysql:8.4
    container_name: photo_vote_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "photo_vote_app"
    volumes:
      - /data/photo-vote-app/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - web_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: photo_vote_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      DATABASE_URL: "mysql://root:123456@mysql:3306/photo_vote_app"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web_network

networks:
  web_network:
    external: true
