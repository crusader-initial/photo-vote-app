services:
  mysql:
    image: mysql:8.4
    container_name: photo_vote_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "photo_vote_app"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: photo_vote_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      DATABASE_URL: "mysql://root:123456@mysql:3306/photo_vote_app"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
